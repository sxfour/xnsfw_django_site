<script>
const storageKey = 'ageConfirmed';

const themeBtn = document.getElementById('darkModeToggle');

function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
}

// Иконка полумесяца
const moonIcon = "🌙";
themeBtn.innerHTML = moonIcon;

// Восстановление состояния
if (localStorage.getItem('darkMode') === 'true') {
  document.body.classList.add('dark-mode');
}

// Обработчик
themeBtn.onclick = toggleDarkMode;

// Модалка
function showModal() {
  document.getElementById('ageModal').style.display = 'flex';
  document.getElementById('content').classList.add('blurred');
}
function hideModal() {
  document.getElementById('ageModal').style.display = 'none';
  document.getElementById('content').classList.remove('blurred');
}
function showBlockedMessage() {
  document.body.innerHTML = '<h2 style="text-align:center; padding:50px;">Для просмотра этого сайта необходимо быть старше 18 лет. Пожалуйста, подтвердите ваш возраст.</h2><button id="retryBtn" style="display:block; margin:20px auto; padding:10px 20px; font-size:16px;">Повторить подтверждение</button>';
  document.body.classList.remove('blurred');
  document.getElementById('retryBtn').onclick = () => {
    localStorage.removeItem(storageKey);
    location.reload();
  };
}
const userChoice = localStorage.getItem(storageKey);
if (userChoice === 'yes') {
  hideModal();
} else if (userChoice === 'no') {
  showBlockedMessage();
} else {
  showModal();
}
document.getElementById('yesBtn').onclick = () => {
  localStorage.setItem(storageKey, 'yes');
  hideModal();
};
document.getElementById('noBtn').onclick = () => {
  localStorage.setItem(storageKey, 'no');
  showBlockedMessage();
};
</script>
